# Лабораторный стек dealer (7 микросервисов). Плейсхолдеры подставляет Jenkins:
# __K8S_DB_HOST__, __K8S_DB_PORT__, __IMG_*__, __PULL_POLICY__
# auth-service ожидает Redis и Kafka по DNS redis:6379 и kafka:29092 — поднимите их в namespace dealer
# или замените env в Deployment auth-service.
---
apiVersion: v1
kind: Namespace
metadata:
  name: dealer
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: dealer
spec:
  selector:
    app: auth-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: dealer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: __IMG_AUTH__
          imagePullPolicy: __PULL_POLICY__
          ports:
            - containerPort: 50051
            - containerPort: 8080
          env:
            - name: AUTH_GRPC_PORT
              value: "50051"
            - name: AUTH_HTTP_PORT
              value: "8080"
            - name: STATIC_DIR
              value: "/app/web"
            - name: POSTGRES_DSN
              value: "postgres://dealer:dealer_secret@__K8S_DB_HOST__:__K8S_DB_PORT__/dealer?sslmode=disable"
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: REDIS_PASSWORD
              value: ""
            - name: REDIS_DB
              value: "0"
            - name: KAFKA_BROKERS
              value: "kafka:29092"
            - name: KAFKA_TOPIC_AUTH_EVENTS
              value: "auth.events"
            - name: JWT_SECRET
              value: "change-me-in-production"
            - name: CUSTOMERS_SERVICE_URL
              value: "http://customers-service.dealer.svc.cluster.local:8081"
            - name: VEHICLES_SERVICE_URL
              value: "http://vehicles-service.dealer.svc.cluster.local:8082"
            - name: DEALS_SERVICE_URL
              value: "http://deals-service.dealer.svc.cluster.local:8083"
            - name: PARTS_SERVICE_URL
              value: "http://parts-service.dealer.svc.cluster.local:8084"
            - name: BRANDS_SERVICE_URL
              value: "http://brands-service.dealer.svc.cluster.local:8085"
            - name: DEALER_POINTS_SERVICE_URL
              value: "http://dealer-points-service.dealer.svc.cluster.local:8086"
---
apiVersion: v1
kind: Service
metadata:
  name: customers-service
  namespace: dealer
spec:
  selector:
    app: customers-service
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers-service
  namespace: dealer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customers-service
  template:
    metadata:
      labels:
        app: customers-service
    spec:
      containers:
        - name: customers-service
          image: __IMG_CUSTOMERS__
          imagePullPolicy: __PULL_POLICY__
          ports:
            - containerPort: 50052
            - containerPort: 8081
          env:
            - name: CUSTOMERS_GRPC_PORT
              value: "50052"
            - name: CUSTOMERS_HTTP_PORT
              value: "8081"
            - name: POSTGRES_DSN
              value: "postgres://dealer:dealer_secret@__K8S_DB_HOST__:__K8S_DB_PORT__/dealer?sslmode=disable"
            - name: JWT_SECRET
              value: "change-me-in-production"
