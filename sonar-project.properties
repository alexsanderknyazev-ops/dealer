# SonarQube / SonarScanner — репозиторий users-go (Go).
# Положи этот файл в КОРЕНЬ репозитория рядом с go.mod.
#
# Локальный SonarQube: sonar.projectKey = Project key из Project information (должен совпадать побайтово).
# Токен Jenkins (credential id: sonarqube-token-user-go) — с этого же SonarQube; Execute analysis на проект.

sonar.projectKey=alexsanderknyazev-ops_users-go_3d181dab-126c-45eb-99aa-6c19b833c568
sonar.projectName=users-go

# После загрузки отчёта опрашивать SonarQube до статуса Quality Gate; при FAILED сканер выходит с кодом ≠0 → Jenkins падает.
sonar.qualitygate.wait=true

# Корень исходников (от корня репозитория)
sonar.sources=.

# Кодировка
sonar.sourceEncoding=UTF-8

# --- Исключения анализа: main, слой БД (database), сгенерированный proto, k8s (лаб-манифесты, секреты, IaC — иначе Quality Gate) ---
sonar.exclusions=**/vendor/**,\
  **/.git/**,\
  **/.github/**,\
  **/.idea/**,\
  **/testdata/**,\
  **/node_modules/**,\
  **/coverage.out,\
  **/*.out,\
  **/go.sum,\
  **/Dockerfile,\
  **/.dockerignore,\
  **/.env,\
  **/resurse/**,\
  **/k8s/**,\
  **/proto/**/*.pb.go,\
  **/proto/**/*_grpc.pb.go,\
  **/database/**,\
  main.go

# Покрытие Sonar: те же исключения + proto (не считаем coverage.out как исходник)
sonar.coverage.exclusions=**/vendor/**,\
  **/proto/**/*.pb.go,\
  **/proto/**/*_grpc.pb.go,\
  **/database/**,\
  main.go

# Тесты Go
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Отчёт покрытия (генерируется в CI: go test ./... -coverprofile=coverage.out)
sonar.go.coverage.reportPaths=coverage.out
