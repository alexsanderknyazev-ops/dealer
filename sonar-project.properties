# SonarQube / SonarScanner — репозиторий dealer (Go).
# Положи этот файл в КОРЕНЬ репозитория рядом с go.mod.
#
# Локальный SonarQube: sonar.projectKey = Project key из Project information (должен совпадать побайтово).
# Токен Jenkins (credential id: dealer-app) — с этого же SonarQube; Execute analysis на проект.

sonar.projectKey=alexsanderknyazev-ops_dealer_7c3652c7-373e-42e9-bc02-3b79cbc94ed6
sonar.projectName=dealer-go

# После загрузки отчёта опрашивать SonarQube до статуса Quality Gate; при FAILED сканер выходит с кодом ≠0 → Jenkins падает.
sonar.qualitygate.wait=true

# Только Go-модули: не ставить sonar.sources=. — иначе JS/TS sensor всё равно подхватывает frontend/** несмотря на sonar.exclusions.
sonar.sources=services,pkg

# Кодировка
sonar.sourceEncoding=UTF-8

# --- Исключения анализа: фронт (отдельный стек), main, слой БД (database), сгенерированный proto, k8s (лаб-манифесты, секреты, IaC — иначе Quality Gate) ---
sonar.exclusions=**/frontend/**,\
  **/vendor/**,\
  **/.git/**,\
  **/.github/**,\
  **/.idea/**,\
  **/testdata/**,\
  **/node_modules/**,\
  **/coverage.out,\
  **/*.out,\
  **/go.sum,\
  **/Dockerfile,\
  **/.dockerignore,\
  **/.env,\
  **/resurse/**,\
  **/k8s/**,\
  **/proto/**/*.pb.go,\
  **/proto/**/*_grpc.pb.go,\
  **/database/**,\
  main.go

# Покрытие Sonar: Jenkins склеивает coverage.out по корню и services/* (см. Jenkinsfile); исключения — сгенерированный код и main
sonar.coverage.exclusions=**/frontend/**,\
  **/vendor/**,\
  **/proto/**/*.pb.go,\
  **/proto/**/*_grpc.pb.go,\
  **/pkg/pb/**,\
  **/database/**,\
  main.go

# Тесты Go (те же корни, что и sources)
sonar.tests=services,pkg
sonar.test.inclusions=**/*_test.go

# Отчёт покрытия (генерируется в CI: go test ./... -coverprofile=coverage.out)
sonar.go.coverage.reportPaths=coverage.out
